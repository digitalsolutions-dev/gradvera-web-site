name: CI

# Type-safety gate. `astro build` (run by Vercel on every deploy) does NOT
# type-check, so a TS / .astro template error can ship silently. `astro check`
# closes that gap. Build + deploy stay Vercel's job — this is check-only.

on:
  pull_request:
  push:
    branches: [main, staging]

# One run per ref; cancel superseded runs (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: astro check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Chromium only (the harness targets one browser); --with-deps pulls the
      # Linux system libs the runner needs.
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      # test:e2e builds the site itself and serves dist/client, then runs the
      # specs. CI=1 turns on a retry + the HTML report.
      - name: Run e2e checks
        run: npm run test:e2e
        env:
          CI: '1'
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
